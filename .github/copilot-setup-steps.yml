# copilot-setup-steps.yml
#
# Prepares the GitHub Copilot coding-agent sandbox for working on the
# Open-Brain ontology-based knowledge store.
#
# Reference:
#   https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

steps:
  # ------------------------------------------------------------------
  # 1. Python runtime
  # ------------------------------------------------------------------
  - name: Set up Python 3.11
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  # ------------------------------------------------------------------
  # 2. Install dependencies
  # ------------------------------------------------------------------
  - name: Install Open-Brain dependencies
    run: pip install --upgrade pip && pip install -r requirements.txt
